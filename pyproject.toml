[tool.pylint.messages_control]
disable = [
    "C0111",  # missing-docstring
    "C0103",  # invalid-name
    "C0303",  # trailing-whitespace
    "W0611",  # unused-import
    "W0612",  # unused-variable
    "W0613",  # unused-argument
    "W0621",  # redefined-outer-name
    "W0703",  # broad-except
    "W0603",  # global-statement
]

[tool.flake8]
ignore = ["E501", "W503", "F401", "F403", "F405"] 